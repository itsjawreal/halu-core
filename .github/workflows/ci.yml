name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src/halu_core

      - name: Pytest (includes package-build and package-content checks)
        run: pytest -q

      - name: Verify migrations apply cleanly from empty
        run: |
          rm -f /tmp/ci_empty.db
          HALU_CORE_DATABASE_URL=sqlite:////tmp/ci_empty.db HALU_CORE_ENV=development \
            alembic upgrade head

      - name: Secret scan (no committed .env, no obvious credentials)
        run: |
          test ! -f .env
          ! grep -RIE "(AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----)" \
            --include="*.py" --include="*.toml" --include="*.md" src/ docs/ .

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify wheel installs into a clean environment
        run: |
          python -m venv /tmp/fresh_env
          /tmp/fresh_env/bin/pip install dist/*.whl
          /tmp/fresh_env/bin/python -c "
          import halu_core
          from halu_core.app import create_app
          create_app()
          try:
              import halu_web
              raise SystemExit('halu_web must not be importable from the halu-core wheel')
          except ModuleNotFoundError:
              pass
          print('OK:', halu_core.__version__)
          "

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
